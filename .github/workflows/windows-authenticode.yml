name: Windows Authenticode

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Existing release version to sign, for example v0.5.0"
        required: true
      mode:
        description: "Run release/config preflight or produce a signed archive"
        required: true
        default: "preflight"
        type: choice
        options:
          - preflight
          - sign

permissions:
  contents: write
  id-token: write

jobs:
  sign-windows-amd64:
    name: Sign Windows amd64 release asset
    runs-on: windows-2025
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release archive
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path work | Out-Null
          gh release download $env:VERSION --repo $env:GITHUB_REPOSITORY --pattern "ctx_${env:VERSION}_windows_amd64.zip" --dir work --clobber
          gh release download $env:VERSION --repo $env:GITHUB_REPOSITORY --pattern "SHA256SUMS" --dir work --clobber
          $archive = "work\ctx_${env:VERSION}_windows_amd64.zip"
          $expectedLine = Get-Content -LiteralPath "work\SHA256SUMS" | Where-Object { $_ -match [regex]::Escape((Split-Path -Leaf $archive)) } | Select-Object -First 1
          if (-not $expectedLine) {
            throw "checksum entry not found for $(Split-Path -Leaf $archive)"
          }
          $expectedHash = ($expectedLine -split '\s+')[0].ToUpperInvariant()
          $actualHash = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToUpperInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "checksum mismatch for $(Split-Path -Leaf $archive): expected $expectedHash got $actualHash"
          }
          gh attestation verify $archive --repo $env:GITHUB_REPOSITORY
          Expand-Archive -LiteralPath "work\ctx_${env:VERSION}_windows_amd64.zip" -DestinationPath work\extract -Force
          $exe = Get-ChildItem -LiteralPath work\extract -Recurse -Filter ctx.exe | Select-Object -First 1
          if (-not $exe) {
            throw "ctx.exe not found in release archive"
          }
          "CTX_EXE=$($exe.FullName)" >> $env:GITHUB_ENV
          "SIGNED_ARCHIVE=ctx_${env:VERSION}_windows_amd64_signed.zip" >> $env:GITHUB_ENV

      - name: Validate signing configuration
        id: signing-config
        env:
          MODE: ${{ inputs.mode }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_SIGNING_ENDPOINT: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          AZURE_SIGNING_ACCOUNT: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          AZURE_SIGNING_CERTIFICATE_PROFILE: ${{ vars.AZURE_SIGNING_CERTIFICATE_PROFILE }}
        shell: pwsh
        run: |
          $missing = @()
          foreach ($name in @(
            "AZURE_CLIENT_ID",
            "AZURE_TENANT_ID",
            "AZURE_SUBSCRIPTION_ID",
            "AZURE_SIGNING_ENDPOINT",
            "AZURE_SIGNING_ACCOUNT",
            "AZURE_SIGNING_CERTIFICATE_PROFILE"
          )) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            "configured=false" >> $env:GITHUB_OUTPUT
            "missing=$($missing -join ', ')" >> $env:GITHUB_OUTPUT
            if ($env:MODE -eq "sign") {
              throw "Missing signing configuration: $($missing -join ', ')"
            }
            Write-Output "Signing configuration is incomplete: $($missing -join ', ')"
          } else {
            "configured=true" >> $env:GITHUB_OUTPUT
            Write-Output "Signing configuration is present."
          }

      - name: Azure login
        if: ${{ inputs.mode == 'sign' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign ctx.exe with Azure Artifact Signing
        if: ${{ inputs.mode == 'sign' }}
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_SIGNING_CERTIFICATE_PROFILE }}
          files: ${{ env.CTX_EXE }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify Authenticode signature
        if: ${{ inputs.mode == 'sign' }}
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature -LiteralPath $env:CTX_EXE
          $signature | Format-List
          if ($signature.Status -ne "Valid") {
            throw "Authenticode signature is not valid: $($signature.Status)"
          }

      - name: Repack signed archive
        if: ${{ inputs.mode == 'sign' }}
        shell: pwsh
        run: |
          $root = Split-Path -Parent $env:CTX_EXE
          Compress-Archive -Path (Join-Path $root "*") -DestinationPath "work\$env:SIGNED_ARCHIVE" -Force
          Get-FileHash -LiteralPath "work\$env:SIGNED_ARCHIVE" -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash.ToLowerInvariant())  $env:SIGNED_ARCHIVE" | Set-Content -LiteralPath "work\SHA256SUMS.signed"
          }

      - name: Upload signed archive to release
        if: ${{ inputs.mode == 'sign' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        shell: pwsh
        run: |
          gh release upload $env:VERSION "work\$env:SIGNED_ARCHIVE" "work\SHA256SUMS.signed" --repo $env:GITHUB_REPOSITORY --clobber

      - name: Preflight summary
        if: ${{ inputs.mode == 'preflight' }}
        shell: pwsh
        run: |
          if ("${{ steps.signing-config.outputs.configured }}" -eq "true") {
            Write-Output "Preflight passed: release asset, checksum, attestation, archive layout, and signing configuration are ready."
          } else {
            Write-Output "Preflight passed for release asset, checksum, attestation, and archive layout."
            Write-Output "Signing configuration still missing: ${{ steps.signing-config.outputs.missing }}"
          }
